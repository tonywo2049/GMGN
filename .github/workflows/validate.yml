name: Validate GMGN

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python3 tests/validate_skills.py
      - run: python3 -m unittest discover -s tests
      - run: python3 -m json.tool .claude-plugin/plugin.json >/dev/null
      - run: python3 -m json.tool .claude-plugin/marketplace.json >/dev/null
      - run: python3 -m json.tool .codex-plugin/plugin.json >/dev/null
      - run: python3 -m json.tool .agents/plugins/marketplace.json >/dev/null
      - run: python3 scripts/package_release.py --allow-dirty --output-dir "$(mktemp -d)"
